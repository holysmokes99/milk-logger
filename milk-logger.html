<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Milk Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --cream: #F7F3EC;
    --bark: #3B2F1E;
    --moss: #4A5C3A;
    --moss-light: #6B7F5A;
    --hay: #C8A84B;
    --milk: #FFFFFF;
    --error: #8B3A2A;
    --fog: #B8B0A4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--bark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 40px;
  }

  header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 32px;
  }

  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--bark); }
  header .date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--fog); letter-spacing: 0.5px; }

  /* ── Setup screen ── */
  #setupScreen {
    width: 100%;
    max-width: 420px;
    background: var(--milk);
    border-radius: 16px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #setupScreen h2 { font-size: 16px; font-weight: 700; color: var(--bark); }
  #setupScreen p  { font-size: 13px; color: var(--fog); line-height: 1.5; }

  #keyInput {
    width: 100%;
    padding: 14px;
    border: 1.5px solid #E0D8CE;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--bark);
    background: var(--cream);
    outline: none;
  }

  #keyInput:focus { border-color: var(--moss); }

  #setupBtn {
    width: 100%;
    padding: 16px;
    background: var(--moss);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  #setupError { font-size: 13px; color: var(--error); display: none; }

  /* ── Main app ── */
  #mainApp { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; }
  #mainApp.visible { display: flex; }

  .cows { width: 100%; display: flex; flex-direction: column; gap: 16px; margin-bottom: 36px; }

  .cow-card {
    background: var(--milk);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(59,47,30,0.08);
  }

  .cow-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--moss); margin-bottom: 14px; }

  .sessions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .session { display: flex; flex-direction: column; gap: 4px; }
  .session-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--fog); letter-spacing: 0.5px; }
  .session-value { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--bark); line-height: 1; }
  .session-value.empty { color: #D8D0C8; }
  .session-value span.unit { font-size: 13px; color: var(--fog); margin-left: 2px; }

  .cow-notes {
    font-size: 12px;
    color: var(--fog);
    font-style: italic;
    line-height: 1.4;
    min-height: 16px;
    border-top: 1px solid #F0EAE0;
    padding-top: 8px;
    margin-top: 4px;
  }

  .voice-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }

  #voiceBtn {
    width: 100%;
    padding: 22px;
    background: var(--moss);
    color: #fff;
    border: none;
    border-radius: 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #voiceBtn:active { transform: scale(0.97); }
  #voiceBtn.listening { background: var(--error); }
  #voiceBtn.listening .btn-icon { animation: pulse 1s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn-icon { font-size: 22px; }

  #transcript {
    width: 100%;
    min-height: 48px;
    background: var(--milk);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--bark);
    line-height: 1.5;
    display: none;
  }
  #transcript.visible { display: block; }

  #statusMsg { font-size: 13px; color: var(--moss-light); text-align: center; min-height: 20px; font-weight: 500; }
  #statusMsg.error { color: var(--error); }

  .confirm-box {
    width: 100%;
    background: var(--milk);
    border-radius: 16px;
    padding: 18px 20px;
    border: 2px solid var(--hay);
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .confirm-box.visible { display: flex; }

  .confirm-text { font-size: 15px; line-height: 1.5; color: var(--bark); }
  .confirm-text strong { color: var(--moss); }

  .confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-confirm {
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-yes { background: var(--moss); color: #fff; }
  .btn-no  { background: var(--cream); color: var(--bark); }

  .change-key {
    font-size: 12px;
    color: var(--fog);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 8px;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bark);
    color: #fff;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🐄 Milk Log</h1>
  <span class="date" id="dateLabel"></span>
</header>

<!-- Setup screen -->
<div id="setupScreen">
  <h2>Enter your API key</h2>
  <p>Your key is saved in this browser so you only need to enter it once.</p>
  <input id="keyInput" type="password" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" spellcheck="false" />
  <div id="setupError">Please enter a valid API key (starts with sk-ant-)</div>
  <button id="setupBtn">Start logging →</button>
</div>

<!-- Main app -->
<div id="mainApp">
  <div class="cows">
    <div class="cow-card">
      <div class="cow-name">Poppy</div>
      <div class="sessions">
        <div class="session">
          <div class="session-label">AM</div>
          <div class="session-value empty" id="poppy-am">—<span class="unit"></span></div>
        </div>
        <div class="session">
          <div class="session-label">PM</div>
          <div class="session-value empty" id="poppy-pm">—<span class="unit"></span></div>
        </div>
      </div>
      <div class="cow-notes" id="poppy-notes"></div>
    </div>
    <div class="cow-card">
      <div class="cow-name">Aurora Rose</div>
      <div class="sessions">
        <div class="session">
          <div class="session-label">AM</div>
          <div class="session-value empty" id="aurora-am">—<span class="unit"></span></div>
        </div>
        <div class="session">
          <div class="session-label">PM</div>
          <div class="session-value empty" id="aurora-pm">—<span class="unit"></span></div>
        </div>
      </div>
      <div class="cow-notes" id="aurora-notes"></div>
    </div>
  </div>

  <div class="voice-wrap">
    <button id="voiceBtn">
      <span class="btn-icon">🎙️</span>
      <span id="btnLabel">Record milking info</span>
    </button>
    <div id="transcript"></div>
    <div id="statusMsg"></div>
    <div class="confirm-box" id="confirmBox">
      <div class="confirm-text" id="confirmText"></div>
      <div class="confirm-actions">
        <button class="btn-confirm btn-no" id="btnNo">Try again</button>
        <button class="btn-confirm btn-yes" id="btnYes">Save ✓</button>
      </div>
    </div>
    <button class="change-key" id="changeKeyBtn">Change API key</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaCvXouV1DjRwTqYBW6srOz2-uC5ELLQalHgRw9L1friyxZ0zMZREhjv5W2OHiAKk/exec';
  const ANTHROPIC_URL   = 'https://api.anthropic.com/v1/messages';

  const COL = {
    'poppy':  { am: 11, pm: 12, notes: 17 },   // K, L, Q
    'aurora': { am: 14, pm: 15, notes: 18 },    // N, O, R
  };

  const JAN1_ROW  = 7;
  const TODAY     = new Date();

  // ── State ─────────────────────────────────────────────────────────────────
  let ANTHROPIC_KEY = '';
  let pendingEntry  = null;

  // ── API key: load from localStorage ──────────────────────────────────────
  const setupScreen = document.getElementById('setupScreen');
  const mainApp     = document.getElementById('mainApp');
  const keyInput    = document.getElementById('keyInput');
  const setupBtn    = document.getElementById('setupBtn');
  const setupError  = document.getElementById('setupError');

  const savedKey = localStorage.getItem('milk_logger_api_key');
  if (savedKey && savedKey.startsWith('sk-ant-')) {
    ANTHROPIC_KEY = savedKey;
    keyInput.value = savedKey;
    showMainApp();
  }

  setupBtn.addEventListener('click', activateKey);
  keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') activateKey(); });

  function activateKey() {
    const val = keyInput.value.trim();
    if (!val.startsWith('sk-ant-')) {
      setupError.style.display = 'block';
      return;
    }
    ANTHROPIC_KEY = val;
    localStorage.setItem('milk_logger_api_key', val);
    setupError.style.display = 'none';
    showMainApp();
  }

  function showMainApp() {
    setupScreen.style.display = 'none';
    mainApp.classList.add('visible');
  }

  document.getElementById('changeKeyBtn').addEventListener('click', () => {
    ANTHROPIC_KEY = '';
    localStorage.removeItem('milk_logger_api_key');
    keyInput.value = '';
    mainApp.classList.remove('visible');
    setupScreen.style.display = 'flex';
  });

  // ── Date helpers ──────────────────────────────────────────────────────────
  function dateToRow(date) {
    const d    = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const jan1 = new Date(2026, 0, 1);
    const diff = Math.round((d - jan1) / 86400000);
    return JAN1_ROW + diff;
  }

  function todayRow() { return dateToRow(new Date()); }

  function parseDate(dateStr) {
    // dateStr from Claude will be "today", "yesterday", or "YYYY-MM-DD"
    if (!dateStr || dateStr === 'today') return new Date();
    if (dateStr === 'yesterday') {
      const d = new Date(); d.setDate(d.getDate() - 1); return d;
    }
    // YYYY-MM-DD
    const [y, m, day] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, day);
  }

  function formatDateLabel(date) {
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
    if (date.toDateString() === today.toDateString()) return 'today';
    if (date.toDateString() === yesterday.toDateString()) return 'yesterday';
    return date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  document.getElementById('dateLabel').textContent = formatDate(new Date());

  // ── Display helpers ───────────────────────────────────────────────────────
  function setStatus(msg, isError = false) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function updateMilkCard(cow, session, kg) {
    const el = document.getElementById(`${cow}-${session}`);
    if (!el) return;
    el.classList.remove('empty');
    el.innerHTML = `${kg}<span class="unit"> kg</span>`;
  }

  function appendNoteDisplay(cow, note) {
    const el = document.getElementById(`${cow}-notes`);
    if (!el) return;
    el.textContent = el.textContent
      ? el.textContent + '; ' + note
      : note;
  }

  // ── Voice recording ───────────────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-CA';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
  }

  const voiceBtn   = document.getElementById('voiceBtn');
  const btnLabel   = document.getElementById('btnLabel');
  const transcript = document.getElementById('transcript');

  voiceBtn.addEventListener('click', () => {
    if (!recognition) { setStatus('Speech recognition not supported on this browser.', true); return; }
    if (voiceBtn.classList.contains('listening')) { recognition.stop(); return; }
    hideConfirm();
    transcript.textContent = '';
    transcript.classList.remove('visible');
    setStatus('');
    recognition.start();
  });

  recognition && (recognition.onstart = () => {
    voiceBtn.classList.add('listening');
    btnLabel.textContent = 'Listening… tap to stop';
  });

  recognition && (recognition.onresult = async (e) => {
    const text = e.results[0][0].transcript;
    transcript.textContent = `"${text}"`;
    transcript.classList.add('visible');
    await parseWithClaude(text);
  });

  recognition && (recognition.onend = () => {
    voiceBtn.classList.remove('listening');
    btnLabel.textContent = 'Record milking info';
  });

  recognition && (recognition.onerror = (e) => {
    voiceBtn.classList.remove('listening');
    btnLabel.textContent = 'Record milking info';
    setStatus('Microphone error: ' + e.error, true);
  });

  // ── Claude parsing ────────────────────────────────────────────────────────
  async function parseWithClaude(text) {
    setStatus('Parsing…');

    const todayStr = new Date().toISOString().split('T')[0];
    const currentYear = new Date().getFullYear();

    const systemPrompt = `You extract farm diary entries from spoken phrases. Today is ${todayStr}.
The farm has two cows: Poppy and Aurora Rose (also called Aurora).
Sessions are AM (morning) or PM (afternoon/evening).
Weight is in kilograms (kg).

There are two types of entries:

1. MILK entry — someone reporting how much milk was collected.
Respond with:
{"type":"milk","cow":"poppy" or "aurora","session":"am" or "pm","kg":number,"date":"today" or "yesterday" or "YYYY-MM-DD"}

2. NOTE entry — someone adding an observation or note about a cow.
Respond with:
{"type":"note","cow":"poppy" or "aurora","note":"the note text cleaned up","date":"today" or "yesterday" or "YYYY-MM-DD"}

Rules:
- Assume AM if morning context, PM if afternoon/evening context. If truly ambiguous, default to AM.
- For dates: "today" if no date mentioned, "yesterday" if they say yesterday, otherwise YYYY-MM-DD using year ${currentYear}.
- For notes, clean up the speech naturally — remove filler like "add a note that" or "note that", keep the meaningful content.
- Cow name is required for both types. If unclear, respond: {"error":"which cow?"}
- If nothing useful can be extracted, respond: {"error":"brief reason"}

Respond ONLY with a JSON object, no markdown, no explanation.`;

    try {
      const res = await fetch(ANTHROPIC_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ANTHROPIC_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 150,
          system: systemPrompt,
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        setStatus('API error ' + res.status + ': ' + (data.error?.message || 'check your key'), true);
        return;
      }

      const raw    = data.content?.[0]?.text?.trim() || '';
      const parsed = JSON.parse(raw);

      if (parsed.error) {
        setStatus('Couldn\'t understand: ' + parsed.error, true);
        return;
      }

      const date    = parseDate(parsed.date);
      const dateLabel = formatDateLabel(date);
      const row     = dateToRow(date);

      if (parsed.type === 'milk') {
        const { cow, session, kg } = parsed;
        const col = COL[cow]?.[session];
        if (!col) { setStatus('Unknown cow or session.', true); return; }
        pendingEntry = { type: 'milk', cow, session, kg, row, col, dateLabel };
        const cowLabel = cow === 'poppy' ? 'Poppy' : 'Aurora Rose';
        document.getElementById('confirmText').innerHTML =
          `Save <strong>${kg} kg</strong> for <strong>${cowLabel}</strong> <strong>${session.toUpperCase()}</strong> — <strong>${dateLabel}</strong>?`;

      } else if (parsed.type === 'note') {
        const { cow, note } = parsed;
        const col = COL[cow]?.notes;
        if (!col) { setStatus('Unknown cow for note.', true); return; }
        pendingEntry = { type: 'note', cow, note, row, col, dateLabel };
        const cowLabel = cow === 'poppy' ? 'Poppy' : 'Aurora Rose';
        document.getElementById('confirmText').innerHTML =
          `Add note for <strong>${cowLabel}</strong> — <strong>${dateLabel}</strong>:<br><em>"${note}"</em>`;
      }

      document.getElementById('confirmBox').classList.add('visible');
      setStatus('');

    } catch (err) {
      setStatus('Error: ' + err.message, true);
      console.error(err);
    }
  }

  // ── Confirm UI ────────────────────────────────────────────────────────────
  function hideConfirm() {
    document.getElementById('confirmBox').classList.remove('visible');
    pendingEntry = null;
  }

  document.getElementById('btnNo').addEventListener('click', () => {
    hideConfirm();
    transcript.classList.remove('visible');
    setStatus('');
  });

  document.getElementById('btnYes').addEventListener('click', async () => {
    if (!pendingEntry) return;
    if (pendingEntry.type === 'milk') {
      await saveMilk(pendingEntry);
    } else if (pendingEntry.type === 'note') {
      await saveNote(pendingEntry);
    }
  });

  // ── Google Sheets: write a single cell ───────────────────────────────────
  async function writeCell(row, col, value) {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ row, col, value })
    });
  }

  // ── Google Sheets: read a cell then append note ───────────────────────────
  async function saveNote({ cow, note, row, col }) {
    setStatus('Saving note…');
    document.getElementById('confirmBox').classList.remove('visible');

    try {
      // Read existing cell value first, then append
      const readRes = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'read', row, col })
      });

      // Because of no-cors we can't read the response body,
      // so we append via a dedicated append action instead
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'append', row, col, value: note, separator: '; ' })
      });

      if (pendingEntry.dateLabel === 'today') appendNoteDisplay(cow, note);
      transcript.classList.remove('visible');
      pendingEntry = null;
      setStatus('');
      showToast('Note saved ✓');

    } catch (err) {
      setStatus('Failed to save note. Check your connection.', true);
      console.error(err);
    }
  }

  async function saveMilk({ cow, session, kg, row, col }) {
    setStatus('Saving to spreadsheet…');
    document.getElementById('confirmBox').classList.remove('visible');

    try {
      await writeCell(row, col, kg);
      if (pendingEntry.dateLabel === 'today') updateMilkCard(cow, session, kg);
      transcript.classList.remove('visible');
      pendingEntry = null;
      setStatus('');
      showToast('Saved ✓');
    } catch (err) {
      setStatus('Failed to save. Check your connection.', true);
      console.error(err);
    }
  }
</script>
</body>
</html>
